<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script src="assets/js/config.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copa — Grupos e Mata-mata</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="index.html" id="navBrand">Subway Tour</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link active" href="grupos-copa.html">Classificação</a>
      </div>
    </div>
  </nav>

  <div class="container mt-4 mb-5">
    <div class="text-center mb-4">
      <h1 class="h2 mb-1" id="pageTitle">Copa Subway</h1>
      <p class="text-muted mb-0" id="tournamentSubtitle">Carregando...</p>
    </div>

    <div id="endedMessage" class="alert alert-secondary text-center d-none" role="alert">
      O torneio atual já foi encerrado.
    </div>

    <div id="noGroupsMessage" class="alert alert-info text-center d-none" role="alert">
      Os grupos deste torneio ainda não foram publicados.
    </div>

    <div id="standingsSection" class="d-none">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <p class="small text-muted mb-0">
          Linhas em <strong>negrito</strong> = zona de classificação.
        </p>
        <button class="btn btn-outline-secondary btn-sm" id="btnRefresh" type="button">
          Atualizar
        </button>
      </div>
      <h2 class="h5 mb-3">Fase de grupos</h2>
      <div id="standingsByGroup"></div>

      <div id="bracketSection" class="mt-5 d-none">
        <h2 class="h5 mb-2">Chave do mata-mata</h2>
        <p class="small text-muted mb-3" id="bracketHint"></p>
        <div class="cup-bracket-wrap">
          <div id="knockoutBracket"></div>
        </div>
      </div>

      <p class="text-muted small text-center mt-3 mb-0" id="lastUpdated"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/cupGroupsUi.js"></script>
  <script src="assets/js/cupBracketUi.js"></script>
  <script src="assets/js/gruposCopaPublic.js"></script>
</body>
</html>
