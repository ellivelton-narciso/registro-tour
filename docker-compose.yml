# Subway VPS (vps-aba40034) — registro-tour + ev_counter + gateway nginx + certbot
# Mesmo padrão do Subway-Hub-API-Rank (HTTP-01 + renovação automática).
# VPS vps-aba40034: ~/registro-tour + ~/Subway-Ev-Counter (irmãos em ~)

services:
  api:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      TEAM_IMAGES_DIR: /data/team-images
      PORT: "3000"
    expose:
      - "3000"
    volumes:
      - team-images:/data/team-images
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-react
      args:
        VITE_API_URL: ${VITE_API_URL:?Defina VITE_API_URL no .env (URL pública da API)}
    expose:
      - "80"
    restart: unless-stopped

  ev-counter:
    build:
      context: ${EV_COUNTER_BUILD_CONTEXT:-../Subway-Ev-Counter}
    env_file:
      - ${EV_COUNTER_ENV_FILE:-../Subway-Ev-Counter/.env}
    expose:
      - "3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      SUBWAY_DOMAIN_FRONTEND: ${DOMAIN_FRONTEND:?Defina DOMAIN_FRONTEND no .env}
      SUBWAY_DOMAIN_API: ${DOMAIN_API:?Defina DOMAIN_API no .env}
      SUBWAY_DOMAIN_EV_COUNTER: ${DOMAIN_EV_COUNTER:?Defina DOMAIN_EV_COUNTER no .env}
      SSL_CERT_DIR: ${SSL_CERT_DIR:-${DOMAIN_FRONTEND}}
      FRONTEND_UPSTREAM: ${FRONTEND_UPSTREAM:-frontend:80}
    volumes:
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - api
      - frontend
      - ev-counter
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $$!; done;"
    restart: unless-stopped

volumes:
  team-images:
  certbot-www:
  certbot-certs:
