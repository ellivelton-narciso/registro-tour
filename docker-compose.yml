# Subway VPS (vps-aba40034) — frontend registro + ev_counter + gateway nginx + certbot
# Backend Express removido: API de torneios vive no Hub (/web) via gateway /backend/

services:
  frontend:
    build:
      context: ./frontend-react
      args:
        # Same-origin: nginx injeta HUB_KEY_REGISTRO ao proxyar /backend → Hub /web
        VITE_API_URL: ${VITE_API_URL:-/backend}
    expose:
      - "80"
    restart: unless-stopped

  ev-counter:
    build:
      context: ${EV_COUNTER_BUILD_CONTEXT:-../Subway-Ev-Counter}
    env_file:
      - ${EV_COUNTER_ENV_FILE:-../Subway-Ev-Counter/.env}
    expose:
      - "3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      SUBWAY_DOMAIN_FRONTEND: ${DOMAIN_FRONTEND:?Defina DOMAIN_FRONTEND no .env}
      SUBWAY_DOMAIN_API: ${DOMAIN_API:?Defina DOMAIN_API no .env}
      SUBWAY_DOMAIN_EV_COUNTER: ${DOMAIN_EV_COUNTER:?Defina DOMAIN_EV_COUNTER no .env}
      SSL_CERT_DIR_FRONTEND: ${SSL_CERT_DIR_FRONTEND:-registro-ds.vako.pt}
      SSL_CERT_DIR_API: ${SSL_CERT_DIR_API:-api.registro-oldgen.vako.pt}
      SSL_CERT_DIR_EV_COUNTER: ${SSL_CERT_DIR_EV_COUNTER:-ev-counter.vako.pt}
      FRONTEND_UPSTREAM: ${FRONTEND_UPSTREAM:-frontend:80}
      HUB_WEB_UPSTREAM: ${HUB_WEB_UPSTREAM:?Defina HUB_WEB_UPSTREAM (ex. https://apiv2.subway.vako.pt)}
      HUB_WEB_HOST: ${HUB_WEB_HOST:?Defina HUB_WEB_HOST (ex. apiv2.subway.vako.pt)}
      HUB_KEY_REGISTRO: ${HUB_KEY_REGISTRO:?Defina HUB_KEY_REGISTRO (mesma key do Hub)}
    volumes:
      - certbot-www:/var/www/certbot:ro
      - ${LETSENCRYPT_DIR:-/etc/letsencrypt}:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - ev-counter
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-www:/var/www/certbot
      - ${LETSENCRYPT_DIR:-/etc/letsencrypt}:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $$!; done;"
    restart: unless-stopped

volumes:
  certbot-www:
